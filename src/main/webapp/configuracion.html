<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="configuracion.css" />
    <title>Configuración</title>
</head>

<body>

    <!-- Botón para abrir el menú -->
    <button class="menu-toggle" id="menuBtn">
        <img src="./img/menuCerrado.svg" alt="menu" id="menuIcon" style="width: 48px; height: 48px;">
    </button>

    <!-- Menú lateral derecho -->
    <aside class="side-menu" id="sideMenu">
        <div class="user-box">
            <div class="user-icon">
                <img src="./img/login.svg" alt="icon">
            </div>
            <p class="user-name">Usuario</p>
        </div>

        <ul class="menu-options">
            <li onclick="window.location.href='perfil.html'">Perfil</li>
            <li onclick="window.location.href='movimientos.html'">Movimientos</li>
            <li onclick="window.location.href='presupuestos.html'">Presupuestos</li>
            <li onclick="window.location.href='metas.html'">Metas</li>
            <li onclick="window.location.href='reportes.html'">Reportes</li>
            <li onclick="window.location.href='copiadeSeguridad.html'">Copia de seguridad</li>

            <li class="active">Configuración</li>
            <li onclick="window.location.href='login.html'">Cerrar Sesión</li>
        </ul>
    </aside>

    <!-- Contenedor principal -->
    <main class="content container">
        <h1 class="page-title">Configuración</h1>

        <form class="config-form">
            <div class="form-grid">
                <div class="input-group">
                    <label>Nombre</label>
                    <input type="text" value="" class="form-input">
                </div>
                <div class="input-group">
                    <label>Apellido</label>
                    <input type="text" value="" class="form-input">
                </div>
                <div class="input-group">
                    <label>Fecha de Nacimiento</label>
                    <input type="date" value="" class="form-input">
                </div>
                <div class="input-group">
                    <label>Genero</label>
                    <div class="input-wrapper" style="position: relative;">
                        <select class="form-input" required>
                            <option value="" disabled selected hidden>Seleccionar</option>
                            <option value="Masculino">Masculino</option>
                            <option value="Femenino">Femenino</option>
                            <option value="Otro">Otro</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="form-grid-single">
                <div class="input-group">
                    <label>Correo</label>
                    <input type="email" value="" class="form-input">
                </div>

                <div class="input-group">
                    <label>Contraseña</label>
                    <input type="password" value="12345678" class="form-input form-input-readonly" readonly disabled>
                </div>

                <a href="javascript:void(0)" class="link-cambiar-contrasena" onclick="openModal()">Cambiar
                    contraseña</a>
            </div>
        </form>
    </main>

    <!-- Modal Cambiar Contraseña -->
    <div class="modal-overlay" id="passwordModal">
        <div class="modal-content">
            <h2 class="modal-title">Cambiar contraseña</h2>

            <div class="modal-form">
                <div class="modal-input-group">
                    <label>Contraseña actual</label>
                    <input type="password" class="modal-input">
                </div>
                <div class="modal-input-group">
                    <label>Nueva contraseña</label>
                    <input type="password" class="modal-input">
                </div>
                <div class="modal-input-group">
                    <label>Confirmar contraseña</label>
                    <input type="password" class="modal-input">
                </div>

                <button type="button" class="btn-actualizar" onclick="closeModal()">Actualizar</button>

                <a href="recuperarContrasena.html" class="link-olvido">¿Olvidaste tu contraseña?</a>
            </div>
        </div>
    </div>

    <!-- Barra inferior -->
    <nav class="bottom-bar">
        <div class="icon" onclick="window.location.href='movimientos.html'">
            <img src="./img/iconMovimiento.svg" alt="icon">
            <span class="text">Movimiento</span>
        </div>
        <div class="icon" onclick="window.location.href='presupuestos.html'">
            <span class="separator"></span>
            <img src="./img/iconPresupuesto.svg" alt="icon">
            <span class="text">Presupuesto</span>
        </div>
        <div class="icon" onclick="window.location.href='metas.html'">
            <span class="separator"></span>
            <img src="./img/iconMetas.svg" alt="icon">
            <span class="text">Metas</span>
        </div>
        <div class="icon" onclick="window.location.href='reportes.html'">
            <span class="separator"></span>
            <img src="./img/iconReportes.svg" alt="icon">
            <span class="text">Reportes</span>
        </div>
    </nav>

    <script>
        const btn = document.getElementById("menuBtn");
        const menu = document.getElementById("sideMenu");
        const icon = document.getElementById("menuIcon");

        btn.addEventListener("click", () => {
            menu.classList.toggle("open");

            if (menu.classList.contains("open")) {
                icon.src = "./img/menuAbierto.svg";
            } else {
                icon.src = "./img/menuCerrado.svg";
            }
        });

        // Lógica del Modal
        const modal = document.getElementById("passwordModal");

        function openModal() {
            modal.classList.add("show");
        }

        function closeModal() {
            modal.classList.remove("show");
        }

        // Cerrar al hacer clic fuera del contenido
        window.onclick = function (event) {
            if (event.target == modal) {
                closeModal();
            }
        }
    </script>
</body>

</html>
