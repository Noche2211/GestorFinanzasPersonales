<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="ingreso.css" />
    <title>Ingreso</title>
</head>

<body>

    <!-- Botón para abrir el menú -->
    <button class="menu-toggle" id="menuBtn">
        <img src="./img/menuCerrado.svg" alt="menu" id="menuIcon" style="width: 48px; height: 48px;">
    </button>

    <!-- Menú lateral derecho -->
    <aside class="side-menu" id="sideMenu">
        <div class="user-box">
            <div class="user-icon">
                <img src="./img/login.svg" alt="icon">
            </div>
            <p class="user-name">Usuario</p>
        </div>

        <ul class="menu-options">
            <li onclick="window.location.href='perfil.html'">Perfil</li>
            <li class="active" onclick="window.location.href='movimientos.html'">Movimientos</li>
            <li onclick="window.location.href='presupuestos.html'">Presupuestos</li>
            <li onclick="window.location.href='metas.html'">Metas</li>
            <li onclick="window.location.href='reportes.html'">Reportes</li>
            <li onclick="window.location.href='copiadeSeguridad.html'">Copia de seguridad</li>
            <li onclick="window.location.href='configuracion.html'">Configuración</li>
            <li onclick="window.location.href='login.html'">Cerrar Sesión</li>
        </ul>
    </aside>

    <!-- Contenedor principal -->
    <main class="content">

        <h1 class="page-title">Ingreso</h1>

        <form class="ingreso-form">

            <div class="form-group">
                <label>Monto</label>
                <div class="input-wrapper">
                    <input type="text" id="montoInput" class="form-input" placeholder="0,00">
                    <span class="input-icon">$</span>
                </div>
            </div>

            <div class="form-group">
                <label>Fecha</label>
                <div class="input-wrapper">
                    <input type="date" id="fechaInput" class="form-input">
                </div>
            </div>

            <div class="form-group">
                <label>Categoria</label>
                <div class="input-wrapper" style="display: flex; flex-direction: column; gap: 10px;">
                    <select class="form-input" id="categoriaSelect">
                        <option value="" disabled selected hidden>Seleccionar...</option>
                        <option value="trabajo">Trabajo</option>
                        <option value="ventas">Ventas</option>
                        <option value="freelance">Freelance</option>
                        <option value="personalizada">Personalizada</option>
                    </select>
                    <!-- Input oculto para la categoría personalizada -->
                    <input type="text" id="categoriaPersonalizadaInput" class="form-input"
                        placeholder="Escribe tu categoría" style="display: none;">
                </div>
            </div>

            <div class="form-group" style="align-items: flex-start;">
                <label style="margin-top: 10px;">Descripcion</label>
                <textarea class="textarea-input" maxlength="80" placeholder="Máximo 80 caracteres"></textarea>
            </div>

            <div class="form-actions">
                <button type="button" class="btn-guardar" onclick="validarFecha()">Guardar</button>
                <button type="button" class="btn-volver-form"
                    onclick="window.location.href='movimientos.html?view=selection'">Volver</button>
            </div>

        </form>

    </main>

    <!-- Notificación de Error de Fecha -->
    <div id="errorNotification" class="notification-error">
        <div class="notification-content">
            <div class="notification-text">
                <strong>Fecha establecida incorrecta</strong>
                <p>La fecha introducida esta fuera del rango que corresponde</p>
            </div>
            <span class="close-icon" onclick="hideError()">×</span>
        </div>
    </div>

    <!-- Barra inferior -->
    <nav class="bottom-bar">
        <div class="icon" onclick="window.location.href='movimientos.html'">
            <img src="./img/iconMovimiento.svg" alt="icon">
            <span class="text">Movimiento</span>
        </div>
        <div class="icon" onclick="window.location.href='presupuestos.html'">
            <span class="separator"></span>
            <img src="./img/iconPresupuesto.svg" alt="icon">
            <span class="text">Presupuesto</span>
        </div>
        <div class="icon" onclick="window.location.href='metas.html'">
            <span class="separator"></span>
            <img src="./img/iconMetas.svg" alt="icon">
            <span class="text">Metas</span>
        </div>
        <div class="icon" onclick="window.location.href='reportes.html'">
            <span class="separator"></span>
            <img src="./img/iconReportes.svg" alt="icon">
            <span class="text">Reportes</span>
        </div>
    </nav>

    <script>
        const btn = document.getElementById("menuBtn");
        const menu = document.getElementById("sideMenu");
        const icon = document.getElementById("menuIcon");

        btn.addEventListener("click", () => {
            menu.classList.toggle("open");

            if (menu.classList.contains("open")) {
                icon.src = "./img/menuAbierto.svg";
            } else {
                icon.src = "./img/menuCerrado.svg";
            }
        });

        const menuItems = document.querySelectorAll(".menu-options li");
        menuItems.forEach(item => {
            item.addEventListener("click", () => {
                menuItems.forEach(i => i.classList.remove("active"));
                item.classList.add("active");
            });
        });

        const footerIcons = document.querySelectorAll(".bottom-bar .icon");
        footerIcons.forEach(icon => {
            icon.addEventListener("click", () => {
                footerIcons.forEach(i => i.classList.remove("active"));
                icon.classList.add("active");
            });
        });

        // Placeholder color logic
        const inputs = document.querySelectorAll('.form-input, .textarea-input');

        function updateInputColor(input) {
            if (!input.value) {
                input.classList.add('placeholder-active');
            } else {
                input.classList.remove('placeholder-active');
            }
        }

        inputs.forEach(input => {
            updateInputColor(input);
            input.addEventListener('change', () => updateInputColor(input));
            input.addEventListener('input', () => updateInputColor(input));
        });

        // Custom Category Logic
        const categoriaSelect = document.getElementById('categoriaSelect');
        const categoriaPersonalizadaInput = document.getElementById('categoriaPersonalizadaInput');

        categoriaSelect.addEventListener('change', function () {
            if (this.value === 'personalizada') {
                categoriaPersonalizadaInput.style.display = 'block';
                updateInputColor(categoriaPersonalizadaInput);
            } else {
                categoriaPersonalizadaInput.style.display = 'none';
                categoriaPersonalizadaInput.value = '';
            }
        });

        // Formateo de Monto
        const montoInput = document.getElementById('montoInput');
        if (montoInput) {
            montoInput.addEventListener('input', function (e) {
                let valor = this.value.replace(/[^0-9,]/g, '');
                const partes = valor.split(',');
                if (partes.length > 2) {
                    partes.pop();
                    valor = partes.join(',');
                }
                if (valor.startsWith(',')) valor = '0' + valor;
                let [entero, decimal] = valor.split(',');
                if (entero) {
                    entero = entero.replace(/^0+(?=\d)/, '');
                    entero = entero.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
                }
                if (decimal !== undefined) {
                    decimal = decimal.substring(0, 2);
                    this.value = entero + ',' + decimal;
                } else {
                    this.value = entero || '';
                }
            });
        }

        // Validación de Fecha
        function validarFecha() {
            const fechaInput = document.getElementById('fechaInput');
            const errorNotif = document.getElementById('errorNotification');

            if (!fechaInput.value) return;

            const hoy = new Date();
            hoy.setHours(0, 0, 0, 0);

            const [year, month, day] = fechaInput.value.split('-').map(Number);
            const dateObj = new Date(year, month - 1, day);
            dateObj.setHours(0, 0, 0, 0);

            if (dateObj > hoy) {
                errorNotif.classList.add('show');
            } else {
                window.location.href = 'movimientos.html?success=income';
            }
        }

        function hideError() {
            document.getElementById('errorNotification').classList.remove('show');
        }
    </script>

</body>

</html>
