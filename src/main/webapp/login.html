<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Gestor de Finanzas</title>
    <link rel="stylesheet" href="./loginStyle.css">
</head>

<body>

    <div class="container">
        <div class="login-card">

            <div class="avatar">
                <img src="./img/login.svg" alt="avatar">
            </div>

            <h2>Iniciar Sesion</h2>

            <form>
                <label for="email">Correo</label>
                <input type="email" id="email" placeholder="Usuario@gmail.com">

                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="**********">

                <button type="button" onclick="login()">Ingresar</button>
            </form>

            <a href="recuperarContrasena.html" class="forgot">¿Olvidaste tu contraseña?</a>
            <a href="crearCuenta.html" class="create">Crear cuenta</a>

        </div>
    </div>

    <!-- Notificación de éxito -->
    <div id="loginNotification" class="notification-toast">
        <div class="notification-content">
            <div class="notification-text">
                <strong>Iniciando sesion...</strong>
                <p>Cargando sus registros</p>
            </div>
            <span class="close-icon" onclick="hideNotification()">×</span>
        </div>
    </div>

    <div class="footer-bar"></div>

    <script>
        function login() {
            const notification = document.getElementById('loginNotification');
            notification.classList.add('show');

            setTimeout(() => {
                window.location.href = 'perfil.html';
            }, 2000);
        }

        function hideNotification() {
            document.getElementById('loginNotification').classList.remove('show');
        }
    </script>
</body>

</html>
