<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Cuenta</title>
    <link rel="stylesheet" href="./crearCuentaStyle.css">
</head>

<body>

    <div class="container">

        <div class="avatar">
            <img src="./img/login.svg" alt="avatar">
        </div>

        <h2 class="titulo">Crear cuenta</h2>

      <form class="formulario" action="UsuarioServlet" method="POST">

    <input type="hidden" name="accion" value="insertar">

    <!-- FILA 1 -->
    <div class="fila fila-separada">
        <div class="campo">
            <label>Nombre</label>
            <input type="text" name="nombre" required>
        </div>

        <div class="campo">
            <label>Apellido</label>
            <input type="text" name="apellido" required>
        </div>
    </div>

    <!-- FILA 2 -->
    <div class="fila fila-separada">
        <div class="campo">
            <label>Fecha de Nacimiento</label>
            <input type="date" name="fechaNac" required>
        </div>

        <div class="campo">
            <label>Género</label>
            <select name="genero" required>
                <option value="" disabled selected hidden>Seleccione</option>
                <option value="masculino">Masculino</option>
                <option value="femenino">Femenino</option>
                <option value="otro">Otro</option>
            </select>
        </div>
    </div>

    <div class="campo">
        <label>Correo</label>
        <input type="email" name="correo" placeholder="usuario@example.com" required>
    </div>

    <div class="campo">
        <label>Contraseña</label>
        <input type="password" name="contrasena" placeholder="••••••••" required>
    </div>

    <!-- PRIVACIDAD -->
    <div class="switch-section">
        <div>
            <p class="texto-principal">Acepto las políticas de privacidad</p>
            <a href="politicasPrivacidad.html" class="texto-secundario link-politicas">Ver políticas</a>
        </div>
        <label class="switch">
            <input type="checkbox" required>
            <span class="slider"></span>
        </label>
    </div>

    <!-- TÉRMINOS -->
    <div class="switch-section">
        <div>
            <p class="texto-principal">Acepto los términos y condiciones</p>
            <a href="terminosCondiciones.html" class="texto-secundario link-politicas">Ver términos</a>
        </div>
        <label class="switch">
            <input type="checkbox" required>
            <span class="slider"></span>
        </label>
    </div>

    <button type="submit" class="btn">Registrarse</button>

</form>

    </div>

    <div class="footer-bar"></div>

</body>

</html>
