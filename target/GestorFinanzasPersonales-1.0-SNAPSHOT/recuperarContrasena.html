<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña - Gestor de Finanzas</title>
    <link rel="stylesheet" href="./recuperarContrasena.css">
</head>

<body>

    <div class="container">
        <div class="recovery-card">

            <div class="avatar-circle">
                <img src="./img/perfil.svg" alt="avatar">
            </div>

            <h2>¿Olvidaste tu contraseña?</h2>

            <p class="description">Enviaremos un enlace temporal al correo<br>que registraste para verificar que eres tú
                y<br>crear una nueva contraseña</p>

            <form>
                <div class="input-group">
                    <label for="email">Correo registrado</label>
                    <input type="email" id="email">
                </div>

                <button type="button" onclick="sendRecoveryLink()">Enviar enlace de
                    recuperación</button>
            </form>

            <div class="links">
                <a href="login.html" class="back-link">Volver al inicio de sesión</a>
                <a href="crearCuenta.html" class="create-link">Crear cuenta</a>
            </div>

        </div>
    </div>

    <!-- Notificación de éxito -->
    <div id="recoveryNotification" class="notification-toast">
        <div class="notification-content">
            <div class="notification-text">
                <strong>Enviado...</strong>
                <p>Enlace de recuperación enviado al correo que registraste</p>
            </div>
            <span class="close-icon" onclick="hideNotification()">×</span>
        </div>
    </div>

    <div class="footer-bar"></div>

    <script>
        function sendRecoveryLink() {
            const notification = document.getElementById('recoveryNotification');
            notification.classList.add('show');

            // Ocultarla automáticamente después de 30 segundos
            setTimeout(() => {
                hideNotification();
            }, 30000);
        }

        function hideNotification() {
            document.getElementById('recoveryNotification').classList.remove('show');
        }
    </script>

</body>

</html>
